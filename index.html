
<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vintique - Vintage Shop</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="vintique.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">


</head>
<body>
  <header>
    <a href="#" class="logo">Vintique</a>
    <button class="burger" onclick="toggleMenu()">☰</button>
    <button id="dark-toggle">🌙</button>

    <nav>
      <a href="index.html">Αρχική</a>
      <a href="#">Κατηγορίες</a>
      <a href="#">Επικοινωνία</a>
      <a href="cart.html" id="cart">🛒 Καλάθι (<span id="cart-count">0</span>)</a>
      <button class="add-product-btn" onclick="document.getElementById('modal').classList.remove('hidden')">➕ Προσθήκη Προϊόντος</button>
    </nav>
    

  </header>

  <div class="hero">
    <h1>Ανακαλύψτε το Vintage στυλ!</h1>
    <p>Μοναδικά κομμάτια για το σπίτι, τη μόδα και όχι μόνο.</p>
  </div>

  <section class="section">
    <h2>🛍️ Προϊόντα</h2>
    <div class="product-grid" id="product-grid"></div>
  </section>

  <footer>
    <p>&copy; 2025 Vintique. Όλα τα δικαιώματα διατηρούνται.</p>
    <p>Όροι Χρήσης | Πολιτική Απορρήτου</p>
  </footer>

  <div id="toast" class="toast hidden">Το προϊόν προστέθηκε στο καλάθι ✅</div>

  <!-- Modal Προσθήκης Προϊόντος -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close" onclick="document.getElementById('modal').classList.add('hidden')">&times;</span>
      <h2>Προσθήκη Προϊόντος</h2>
      <form id="product-form">
        <input type="text" id="title" placeholder="Τίτλος προϊόντος" required><br><br>
        <input type="text" id="brand" placeholder="Μάρκα" required><br><br>
        <input type="text" id="image" placeholder="Σύνδεσμος εικόνας (.jpg)" required><br><br>
        <img id="image-preview" src="" style="max-width:100%; height:100px; margin-bottom:10px;" /><br>
        <input type="number" id="price" placeholder="Τιμή (€)" required><br><br>
        <textarea id="description" placeholder="Περιγραφή" required></textarea><br><br>
        <button type="submit">Προσθήκη</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
